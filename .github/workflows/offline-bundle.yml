name: Offline Bundle & Auto-Sync

on:
  schedule:
    # 每天早上 8:00 UTC 检查上游更新
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check-and-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      has-update: ${{ steps.sync.outputs.has-update }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check upstream updates
        id: sync
        run: |
          # 获取当前 commit hash
          CURRENT_HASH=$(git rev-parse HEAD)
          echo "current_hash=$CURRENT_HASH" >> $GITHUB_OUTPUT
          
          # 检查是否有新的 commit（通过日期判断）
          if [ -z "${{ github.event.schedule }}" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "has-update=false" >> $GITHUB_OUTPUT
          else
            echo "has-update=true" >> $GITHUB_OUTPUT
          fi

      - name: Get version
        id: version
        run: |
          VERSION=$(node -pe "require('./package.json').version")
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BUNDLE_VERSION="${VERSION}-${TIMESTAMP}"
          echo "version=$BUNDLE_VERSION" >> $GITHUB_OUTPUT
          echo "version_short=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Scan and download dependencies
        id: scan
        run: |
          node .github/scripts/scan-dependencies.js
          echo "scan_completed=true" >> $GITHUB_OUTPUT

      - name: Generate offline configuration
        id: config
        run: |
          node .github/scripts/generate-offline-config.js "${{ steps.version.outputs.version }}"

      - name: Prepare bundle content
        id: prepare
        run: |
          mkdir -p bundle_content
          
          # 复制源代码（包含 .git 文件夹）
          cp -r . bundle_content/source --exclude=dist --exclude=.github/workflows/offline-bundle.yml
          
          # 复制 node_modules
          if [ -d "node_modules" ]; then
            cp -r node_modules bundle_content/
            echo "node_modules_included=true" >> $GITHUB_OUTPUT
          else
            echo "node_modules_included=false" >> $GITHUB_OUTPUT
          fi
          
          # 复制 offline_dependencies（如果存在）
          if [ -d "offline_dependencies" ]; then
            cp -r offline_dependencies bundle_content/
            echo "offline_dependencies_included=true" >> $GITHUB_OUTPUT
          else
            echo "offline_dependencies_included=false" >> $GITHUB_OUTPUT
          fi
          
          # 复制 npm cache（如果存在）
          if [ -d ".npm-cache" ]; then
            cp -r .npm-cache bundle_content/
            echo "npm_cache_included=true" >> $GITHUB_OUTPUT
          else
            echo "npm_cache_included=false" >> $GITHUB_OUTPUT
          fi
          
          # 复制配置文件
          if [ -f "offline_npmrc" ]; then
            cp offline_npmrc bundle_content/
          fi
          
          if [ -f "OFFLINE_INSTALL.md" ]; then
            cp OFFLINE_INSTALL.md bundle_content/
          fi
          
          if [ -f "DEPENDENCIES.json" ]; then
            cp DEPENDENCIES.json bundle_content/
          fi

      - name: Download platform dependencies
        id: download-deps
        run: |
          mkdir -p bundle_content/platform-dependencies
          
          # 创建平台依赖文件夹
          mkdir -p bundle_content/platform-dependencies/windows
          mkdir -p bundle_content/platform-dependencies/linux
          
          # 下载 Windows 依赖（示例：可根据实际需要调整）
          # 如果项目有特定的 Windows 依赖，在这里下载
          echo "Windows dependencies folder prepared" > bundle_content/platform-dependencies/windows/README.md
          
          # 下载 Linux 依赖（示例：可根据实际需要调整）
          # 如果项目有特定的 Linux 依赖，在这里下载
          echo "Linux dependencies folder prepared" > bundle_content/platform-dependencies/linux/README.md
          
          echo "platform_dependencies_prepared=true" >> $GITHUB_OUTPUT

      - name: Generate checksums
        id: checksums
        run: |
          cd bundle_content
          find . -type f ! -path './.git/*' -exec sha256sum {} \; > SHA256SUMS
          cat SHA256SUMS
          cd ..

      - name: Create unified bundle
        id: bundle
        run: |
          mkdir -p dist
          
          # 创建单个压缩包，包含所有内容
          tar -czf dist/offline-bundle-${{ steps.version.outputs.version }}.tar.gz bundle_content/
          
          # 计算 SHA256
          SHA256=$(sha256sum dist/offline-bundle-${{ steps.version.outputs.version }}.tar.gz | cut -d' ' -f1)
          echo "bundle_sha256=$SHA256" >> $GITHUB_OUTPUT
          
          # 计算大小
          SIZE=$(du -h dist/offline-bundle-${{ steps.version.outputs.version }}.tar.gz | cut -f1)
          echo "bundle_size=$SIZE" >> $GITHUB_OUTPUT
          
          # 计算包含的内容大小
          SOURCE_SIZE=$(du -sh bundle_content/source | cut -f1)
          TOTAL_SIZE=$(du -sh bundle_content | cut -f1)
          
          echo "source_size=$SOURCE_SIZE" >> $GITHUB_OUTPUT
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT

      - name: Generate checksums file for release
        run: |
          cd dist
          sha256sum offline-bundle-${{ steps.version.outputs.version }}.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: offline-bundle-${{ steps.version.outputs.version }}
          name: Offline Bundle ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            # Offline Bundle Release
            
            **Version**: ${{ steps.version.outputs.version }}
            **Build Time**: ${{ github.event.head_commit.timestamp || github.server_url }}
            
            ## 📦 Complete Offline Bundle
            
            ### Archive Information
            - **File**: `offline-bundle-${{ steps.version.outputs.version }}.tar.gz`
            - **Compressed Size**: ${{ steps.bundle.outputs.bundle_size }}
            - **Uncompressed Size**: ${{ steps.bundle.outputs.total_size }}
            - **SHA256**: `${{ steps.bundle.outputs.bundle_sha256 }}`
            
            ## 📋 Contents Included
            
            This single archive contains everything needed for offline installation:
            
            ✅ **Source Code** (`source/`)
            - Complete project source code
            - Full `.git` history and metadata
            - Size: ${{ steps.bundle.outputs.source_size }}
            
            ✅ **Node Modules** (`node_modules/`)
            - Pre-compiled dependencies
            - Ready to use without `npm install`
            
            ✅ **Offline Dependencies** (`offline_dependencies/`)
            - Additional offline dependencies (if available)
            
            ✅ **NPM Cache** (`.npm-cache/`)
            - Cached npm packages (if available)
            
            ✅ **Platform Dependencies** (`platform-dependencies/`)
            - **Windows** - Windows-specific dependencies and libraries
            - **Linux** - Linux-specific dependencies and libraries
            
            ✅ **Configuration Files**
            - `offline_npmrc` - NPM configuration for offline mode
            - `OFFLINE_INSTALL.md` - Installation guide
            - `DEPENDENCIES.json` - Complete dependency list
            
            ✅ **Integrity Verification**
            - `SHA256SUMS` - SHA256 checksums for all files
            
            ## 🔐 Verify Integrity
            
            ```bash
            # Extract the archive
            tar -xzf offline-bundle-${{ steps.version.outputs.version }}.tar.gz
            
            # Verify checksums
            cd bundle_content
            sha256sum -c SHA256SUMS
            ```
            
            ## 📥 Quick Start
            
            ```bash
            # 1. Extract the bundle
            tar -xzf offline-bundle-${{ steps.version.outputs.version }}.tar.gz
            cd bundle_content
            
            # 2. Navigate to source
            cd source
            
            # 3. Copy node_modules from parent directory
            cp -r ../node_modules .
            
            # 4. Ready to use!
            npm run build
            ```
            
            ## 📋 Installation Guide
            
            For detailed offline installation instructions, see `OFFLINE_INSTALL.md` in the archive.
            
            ## 🔧 System Requirements
            
            - **Windows**: See `platform-dependencies/windows/`
            - **Linux**: See `platform-dependencies/linux/`
            
            ---
            
            **Generated by**: GitHub Actions
            **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          artifacts: |
            dist/offline-bundle-${{ steps.version.outputs.version }}.tar.gz
            dist/SHA256SUMS

      - name: Cleanup
        if: always()
        run: |
          rm -rf dist bundle_content
