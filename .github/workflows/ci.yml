name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}

      - name: Compile TypeScript
        run: npm run compile

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm run test

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build
